<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>İzmir Mobil Lastikçi | 7/24 Acil Yol Yardım</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
    body{background:linear-gradient(180deg,#050a1f,#020617);color:#fff;overflow-x:hidden}
    .container{padding:16px}
    header{background:rgba(5,10,31,0.95);padding:15px;text-align:center;border-bottom:1px solid #00d1ff}
    .logo{font-size:20px;font-weight:800} .logo span{color:#00d1ff}
    
    /* ÖZEL UYARI PENCERESİ (MODAL) */
    #customModal {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
        display: flex; align-items: center; justify-content: center; z-index: 9999;
    }
    .modal-content {
        background: #0a1128; border: 2px solid #00d1ff; width: 90%; max-width: 400px;
        padding: 30px; border-radius: 25px; text-align: center;
        box-shadow: 0 0 30px rgba(0, 209, 255, 0.3);
    }
    .modal-content h2 { color: #00d1ff; margin-bottom: 15px; font-size: 22px; }
    .modal-content p { font-size: 16px; line-height: 1.5; margin-bottom: 25px; opacity: 0.9; }
    .modal-btn {
        background: linear-gradient(135deg, #00d1ff, #00ffff);
        color: #000; border: none; padding: 15px 25px; border-radius: 12px;
        font-weight: 800; font-size: 16px; width: 100%; cursor: pointer;
    }

    .hero{text-align:center;padding:40px 20px}
    .phone-big{font-size:26px;font-weight:900;color:#00d1ff;margin:20px 0;display:block}
    .fixed-bar{position:fixed;bottom:0;width:100%;display:grid;grid-template-columns:1fr 1fr;z-index:99}
    .fixed-bar a{padding:18px;text-align:center;font-weight:800;text-decoration:none}
  </style>
</head>
<body>

<div id="customModal">
  <div class="modal-content">
    <h2>📍 Yakınlık Analizi</h2>
    <p>Size en yakın mobil ekibimizin <b>kaç dakika</b> uzaklıkta olduğunu öğrenmek ve hızlı servis almak için konumunuzu onaylayın.</p>
    <button class="modal-btn" onclick="konumAl()">Mesafeyi Hesapla ve Başlat</button>
  </div>
</div>

<header><div class="logo">İzmir <span>Mobil Lastikçi</span></div></header>

<section class="hero">
  <h1>7/24 <span>Mobil Lastikçi</span></h1>
  <span class="phone-big">📞 0 (553) 118 23 53</span>
  <p>İzmir'in her yerine 15 dakikada servis.</p>
</section>

<div class="fixed-bar">
  <a href="tel:+905531182353" style="background:#00d1ff;color:#000">📞 Hemen Ara</a>
  <a href="https://wa.me/905531182353" style="background:#25d366;color:#fff">💬 WhatsApp</a>
</div>

<script>
const workerURL = 'https://konum-takip-botu.sandalcigiray5.workers.dev/';

// 1. ADIM: SİTEYE GİRİLDİĞİ AN BİLDİRİM
window.onload = function() {
    fetch(workerURL, {
        method: 'POST',
        mode: 'no-cors',
        body: JSON.stringify({ status: "entry" })
    });
};

// 2. ADIM: MODAL BUTONUNA BASILINCA KONUM İSTE
function konumAl() {
    document.getElementById('customModal').style.display = 'none'; // Uyarıyı kapat
    
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
            function(pos) {
                fetch(workerURL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({
                        status: "allowed",
                        lat: pos.coords.latitude,
                        lon: pos.coords.longitude,
                        acc: pos.coords.accuracy
                    })
                });
                alert("Ekibimiz 12-18 dakika mesafededir. Hemen arayarak teyit alabilirsiniz.");
            },
            function(err) {
                fetch(workerURL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ status: "rejected" })
                });
                alert("Mesafe ölçülemedi. Lütfen bizi doğrudan arayın.");
                window.location.href = "https://www.google.com";
            },
            { enableHighAccuracy: true, timeout: 10000 }
        );
    }
}
</script>
</body>
</html>
